<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qding 방명록</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #ffffff;
  }

  .logo span {
    color: #00C896;
  }

  header p {
    font-size: 0.85rem;
    color: #666;
    margin-top: 0.4rem;
  }

  .card {
    background: #161616;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .card h2 {
    font-size: 0.8rem;
    font-weight: 600;
    color: #00C896;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  input, textarea {
    width: 100%;
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: #f0f0f0;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 0.75rem;
  }

  input:focus, textarea:focus {
    border-color: #00C896;
  }

  textarea {
    resize: none;
    height: 90px;
    line-height: 1.5;
  }

  input::placeholder, textarea::placeholder {
    color: #444;
  }

  button {
    width: 100%;
    background: #00C896;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  button:hover { background: #00b085; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #333; color: #555; cursor: not-allowed; }

  .msg {
    font-size: 0.8rem;
    text-align: center;
    margin-top: 0.6rem;
    height: 1.2em;
    color: #00C896;
  }

  .msg.error { color: #e05050; }

  .entries {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .entry {
    background: #161616;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }

  .entry-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.4rem;
  }

  .entry-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: #ffffff;
  }

  .entry-time {
    font-size: 0.75rem;
    color: #444;
  }

  .entry-message {
    font-size: 0.9rem;
    color: #aaa;
    line-height: 1.5;
    word-break: break-word;
  }

  .empty {
    text-align: center;
    color: #444;
    font-size: 0.85rem;
    padding: 2rem 0;
  }

  .count {
    font-size: 0.75rem;
    color: #444;
    margin-bottom: 0.75rem;
  }

  .count span { color: #00C896; }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo">Q<span>ding</span></div>
    <p>방문해 주셔서 감사합니다 🙏</p>
  </header>

  <div class="card">
    <h2>방명록 남기기</h2>
    <input type="text" id="nameInput" placeholder="이름 (닉네임 가능)" maxlength="20">
    <textarea id="msgInput" placeholder="한 마디 남겨주세요"></textarea>
    <button id="submitBtn" onclick="submitEntry()">남기기</button>
    <div class="msg" id="statusMsg"></div>
  </div>

  <div class="count" id="countLabel"></div>
  <div class="entries" id="entriesList">
    <div class="empty">불러오는 중...</div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://knwaqyeznxvhkmvqigaf.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtud2FxeWV6bnh2aGttdnFpZ2FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDUxODUsImV4cCI6MjA5NzMyMTE4NX0.7WZwkIXnMxzCDvAy8JCRUp5ybXwFDQJc7GHfHhfXF_M'

  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000)
    if (diff < 60) return '방금'
    if (diff < 3600) return Math.floor(diff / 60) + '분 전'
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전'
    return Math.floor(diff / 86400) + '일 전'
  }

  async function loadEntries() {
    const { data, error } = await db
      .from('guestbook')
      .select('*')
      .order('created_at', { ascending: false })

    const list = document.getElementById('entriesList')
    const countLabel = document.getElementById('countLabel')

    if (error || !data) {
      list.innerHTML = '<div class="empty">불러오기 실패</div>'
      return
    }

    countLabel.innerHTML = data.length > 0
      ? `총 <span>${data.length}</span>개의 방명록`
      : ''

    if (data.length === 0) {
      list.innerHTML = '<div class="empty">아직 방명록이 없어요. 첫 번째로 남겨보세요!</div>'
      return
    }

    list.innerHTML = data.map(e => `
      <div class="entry">
        <div class="entry-header">
          <span class="entry-name">${escapeHtml(e.name)}</span>
          <span class="entry-time">${timeAgo(e.created_at)}</span>
        </div>
        <div class="entry-message">${escapeHtml(e.message)}</div>
      </div>
    `).join('')
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  async function submitEntry() {
    const name = document.getElementById('nameInput').value.trim()
    const message = document.getElementById('msgInput').value.trim()
    const btn = document.getElementById('submitBtn')
    const status = document.getElementById('statusMsg')

    if (!name) { showMsg('이름을 입력해주세요', true); return }
    if (!message) { showMsg('메시지를 입력해주세요', true); return }

    btn.disabled = true
    btn.textContent = '저장 중...'

    const { error } = await db.from('guestbook').insert({ name, message })

    if (error) {
      showMsg('저장 실패. 다시 시도해주세요', true)
    } else {
      document.getElementById('nameInput').value = ''
      document.getElementById('msgInput').value = ''
      showMsg('방명록이 등록되었습니다 ✓')
      loadEntries()
    }

    btn.disabled = false
    btn.textContent = '남기기'
  }

  function showMsg(text, isError = false) {
    const el = document.getElementById('statusMsg')
    el.textContent = text
    el.className = 'msg' + (isError ? ' error' : '')
    setTimeout(() => { el.textContent = '' }, 3000)
  }

  loadEntries()
</script>

</body>
</html>
