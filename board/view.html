<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qding 게시판</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 640px; margin: 0 auto; }
  header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
  .back-btn { color: #555; text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
  .back-btn:hover { color: #00C896; }
  .logo { font-size: 1.4rem; font-weight: 700; color: #ffffff; }
  .logo span { color: #00C896; }
  .post-card { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .post-category { font-size: 0.75rem; font-weight: 600; color: #00C896; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .post-title { font-size: 1.2rem; font-weight: 600; color: #ffffff; margin-bottom: 0.75rem; line-height: 1.4; }
  .post-meta { font-size: 0.8rem; color: #555; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; justify-content: space-between; }
  .post-meta-left span { margin-right: 1rem; }
  .post-actions { display: flex; gap: 0.5rem; }
  .action-btn { background: none; border: 1px solid #2a2a2a; border-radius: 6px; color: #555; font-size: 0.75rem; padding: 0.3rem 0.7rem; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
  .action-btn:hover { color: #f0f0f0; border-color: #555; }
  .action-btn.delete:hover { color: #e05050; border-color: #e05050; }
  .post-content { font-size: 0.95rem; color: #ccc; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }

  /* 비밀번호 확인 박스 */
  .pw-box { background: #111; border: 1px solid #2a2a2a; border-radius: 10px; padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
  .pw-box.open { display: block; }
  .pw-box-title { font-size: 0.8rem; font-weight: 600; color: #00C896; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .pw-row { display: flex; gap: 0.5rem; }
  .pw-row input { flex: 1; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 6px; padding: 0.65rem 1rem; color: #f0f0f0; font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .pw-row input:focus { border-color: #00C896; }
  .pw-row input::placeholder { color: #444; }
  .pw-confirm-btn { background: #00C896; color: #0a0a0a; border: none; border-radius: 6px; padding: 0.65rem 1rem; font-size: 0.85rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
  .pw-confirm-btn:hover { background: #00b085; }
  .pw-msg { font-size: 0.8rem; color: #e05050; margin-top: 0.5rem; height: 1.2em; }

  .section-title { font-size: 0.8rem; font-weight: 600; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }
  .comment-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 1.5rem; }
  .comment-item { padding: 1rem 0; border-bottom: 1px solid #1a1a1a; }
  .comment-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
  .comment-author { font-size: 0.85rem; font-weight: 600; color: #fff; }
  .comment-time { font-size: 0.75rem; color: #444; }
  .comment-content { font-size: 0.9rem; color: #aaa; line-height: 1.5; word-break: break-word; }
  .empty-comment { text-align: center; color: #444; font-size: 0.85rem; padding: 1.5rem 0; }
  .comment-form { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 1.25rem; }
  .comment-form input, .comment-form textarea { width: 100%; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0.7rem 1rem; color: #f0f0f0; font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.2s; margin-bottom: 0.6rem; }
  .comment-form input:focus, .comment-form textarea:focus { border-color: #00C896; }
  .comment-form textarea { resize: none; height: 80px; line-height: 1.5; }
  .comment-form input::placeholder, .comment-form textarea::placeholder { color: #444; }
  .comment-submit { width: 100%; background: #00C896; color: #0a0a0a; border: none; border-radius: 8px; padding: 0.75rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s; }
  .comment-submit:hover { background: #00b085; }
  .comment-submit:active { transform: scale(0.98); }
  .comment-submit:disabled { background: #333; color: #555; cursor: not-allowed; }
  .msg { font-size: 0.8rem; text-align: center; margin-top: 0.5rem; height: 1.2em; color: #00C896; }
  .msg.error { color: #e05050; }
  .loading { color: #444; font-size: 0.85rem; padding: 2rem 0; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <header>
    <a class="back-btn" id="backBtn" href="index.html">← 목록</a>
    <div class="logo">Q<span>ding</span></div>
  </header>

  <div class="post-card" id="postCard">
    <div class="loading">불러오는 중...</div>
  </div>

  <!-- 비밀번호 확인 박스 -->
  <div class="pw-box" id="pwBox">
    <div class="pw-box-title" id="pwBoxTitle">비밀번호 확인</div>
    <div class="pw-row">
      <input type="password" id="pwInput" placeholder="글 작성 시 입력한 비밀번호" maxlength="20"
             onkeydown="if(event.key==='Enter') confirmPassword()">
      <button class="pw-confirm-btn" onclick="confirmPassword()">확인</button>
    </div>
    <div class="pw-msg" id="pwMsg"></div>
  </div>

  <div class="section-title" id="commentCount"></div>
  <div class="comment-list" id="commentList"></div>

  <div class="comment-form">
    <input type="text" id="commentAuthor" placeholder="이름 또는 닉네임" maxlength="20">
    <textarea id="commentContent" placeholder="댓글을 입력하세요"></textarea>
    <button class="comment-submit" id="commentBtn" onclick="submitComment()">댓글 등록</button>
    <div class="msg" id="commentMsg"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://knwaqyeznxvhkmvqigaf.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtud2FxeWV6bnh2aGttdnFpZ2FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDUxODUsImV4cCI6MjA5NzMyMTE4NX0.7WZwkIXnMxzCDvAy8JCRUp5ybXwFDQJc7GHfHhfXF_M'
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  const params = new URLSearchParams(window.location.search)
  const postId = parseInt(params.get('id'))

  let postData = null        // 게시글 데이터 저장
  let pendingAction = null   // 'edit' or 'delete'
  let currentCat = 'notice'

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000)
    if (diff < 60) return '방금'
    if (diff < 3600) return Math.floor(diff / 60) + '분 전'
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전'
    return Math.floor(diff / 86400) + '일 전'
  }

  function escapeHtml(str) {
    if (!str) return ''
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  async function loadPost() {
    const { data, error } = await db
      .from('board')
      .select('*, category(name, category)')
      .eq('id', postId)
      .single()

    const card = document.getElementById('postCard')
    if (error || !data) { card.innerHTML = '<div class="loading">게시글을 찾을 수 없습니다</div>'; return }

    postData = data
    currentCat = data.category?.category || 'notice'
    document.getElementById('backBtn').href = 'index.html?category=' + currentCat

    card.innerHTML =
      '<div class="post-category">' + escapeHtml(data.category?.name || '') + '</div>' +
      '<div class="post-title">' + escapeHtml(data.title) + '</div>' +
      '<div class="post-meta">' +
        '<div class="post-meta-left">' +
          '<span>' + escapeHtml(data.author) + '</span>' +
          '<span>' + timeAgo(data.created_at) + '</span>' +
        '</div>' +
        '<div class="post-actions">' +
          '<button class="action-btn" onclick="requestAction(\'edit\')">수정</button>' +
          '<button class="action-btn delete" onclick="requestAction(\'delete\')">삭제</button>' +
        '</div>' +
      '</div>' +
      '<div class="post-content">' + escapeHtml(data.content) + '</div>'
  }

  // 수정/삭제 버튼 클릭 → 비밀번호 박스 열기
  function requestAction(action) {
    pendingAction = action
    const box = document.getElementById('pwBox')
    const title = document.getElementById('pwBoxTitle')
    title.textContent = action === 'edit' ? '수정하려면 비밀번호를 입력하세요' : '삭제하려면 비밀번호를 입력하세요'
    box.classList.add('open')
    document.getElementById('pwInput').focus()
    document.getElementById('pwMsg').textContent = ''
  }

  // 비밀번호 확인
  async function confirmPassword() {
    const pw = document.getElementById('pwInput').value.trim()
    const msg = document.getElementById('pwMsg')
    if (!pw) { msg.textContent = '비밀번호를 입력해주세요'; return }

    // DB에서 password 조회 후 비교
    const { data } = await db
      .from('board')
      .select('password')
      .eq('id', postId)
      .single()

    if (!data || data.password !== pw) {
      msg.textContent = '비밀번호가 틀렸습니다'
      document.getElementById('pwInput').value = ''
      return
    }

    // 비밀번호 일치
    document.getElementById('pwBox').classList.remove('open')
    document.getElementById('pwInput').value = ''
    msg.textContent = ''

    if (pendingAction === 'edit') {
      window.location.href = 'edit.html?id=' + postId
    } else if (pendingAction === 'delete') {
      await deletePost()
    }
  }

  // 게시글 삭제
  async function deletePost() {
    if (!confirm('게시글을 삭제하시겠습니까?')) return
    const { error } = await db.from('board').delete().eq('id', postId)
    if (error) { alert('삭제 실패'); return }
    window.location.href = 'index.html?category=' + currentCat
  }

  async function loadComments() {
    const { data, error } = await db
      .from('comment').select('*').eq('board_id', postId).order('created_at', { ascending: true })

    const list = document.getElementById('commentList')
    const countEl = document.getElementById('commentCount')

    if (error || !data) { list.innerHTML = '<div class="empty-comment">댓글을 불러올 수 없습니다</div>'; return }

    countEl.textContent = '댓글 ' + data.length + '개'

    if (data.length === 0) { list.innerHTML = '<div class="empty-comment">첫 댓글을 남겨보세요</div>'; return }

    list.innerHTML = data.map(c =>
      '<div class="comment-item">' +
        '<div class="comment-header">' +
          '<span class="comment-author">' + escapeHtml(c.author) + '</span>' +
          '<span class="comment-time">' + timeAgo(c.created_at) + '</span>' +
        '</div>' +
        '<div class="comment-content">' + escapeHtml(c.content) + '</div>' +
      '</div>'
    ).join('')
  }

  async function submitComment() {
    const author = document.getElementById('commentAuthor').value.trim()
    const content = document.getElementById('commentContent').value.trim()
    const btn = document.getElementById('commentBtn')
    if (!author)  { showMsg('이름을 입력해주세요', true); return }
    if (!content) { showMsg('댓글을 입력해주세요', true); return }
    btn.disabled = true
    btn.textContent = '저장 중...'
    const { error } = await db.from('comment').insert({ board_id: postId, author, content })
    if (error) { showMsg('저장 실패. 다시 시도해주세요', true) }
    else { document.getElementById('commentContent').value = ''; showMsg('댓글이 등록되었습니다 ✓'); loadComments() }
    btn.disabled = false
    btn.textContent = '댓글 등록'
  }

  function showMsg(text, isError = false) {
    const el = document.getElementById('commentMsg')
    el.textContent = text
    el.className = 'msg' + (isError ? ' error' : '')
    setTimeout(() => { el.textContent = '' }, 3000)
  }

  if (postId) { loadPost(); loadComments() }
  else { document.getElementById('postCard').innerHTML = '<div class="loading">잘못된 접근입니다</div>' }
</script>
</body>
</html>
