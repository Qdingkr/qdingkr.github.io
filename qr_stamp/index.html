<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qding 스탬프 관리</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --accent: #00b359;
      --accent-dim: #009948;
      --danger: #e53935;
      --warn: #f57c00;
      --text: #1a1a1a;
      --text-dim: #666;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
    }

    /* ── 로그인 ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-box h2 { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 8px; }

    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }

    .btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dim); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-warn    { background: var(--warn); color: #000; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 7px 14px; font-size: 0.82rem; }

    .error-msg { color: var(--danger); font-size: 0.85rem; text-align: center; }

    /* ── 상단바 ── */
    #dashboard { display: none; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar .logo { font-size: 1.3rem; margin: 0; }
    .store-name { font-size: 0.9rem; color: var(--text-dim); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }

    /* ── 메인 ── */
    .main {
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── 탭 ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.2s;
    }
    .tab.active { background: var(--accent); color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── 섹션 ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── 카드 박스 ── */
    .box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    /* ── 템플릿 ── */
    .tmpl-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .tmpl-row input { flex: 1; min-width: 120px; }

    .tmpl-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .tmpl-item:last-child { border-bottom: none; }
    .tmpl-reward { font-size: 0.95rem; font-weight: 600; }
    .tmpl-goal   { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }

    /* ── 카드 목록 ── */
    .card-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .card-item:last-child { border-bottom: none; }
    .card-id    { font-size: 0.75rem; color: var(--text-dim); font-family: monospace; }
    .card-stamp { font-size: 1rem; font-weight: 700; color: var(--accent); margin-top: 4px; }
    .card-reward{ font-size: 0.8rem; color: var(--text-dim); }
    .card-actions { display: flex; gap: 8px; }

    /* ── 발급 모달 ── */
    #modal-issue {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #modal-issue.open { display: flex; }
    .modal-inner {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
    }
    .modal-inner h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btns .btn { flex: 1; }

    #qr-result { text-align: center; padding: 16px 0 0; }
    #qr-result p { font-size: 0.8rem; color: var(--text-dim); margin-top: 8px; }
    #qr-result .qr-url {
      font-size: 0.72rem;
      color: var(--accent);
      word-break: break-all;
      margin-top: 6px;
      font-family: monospace;
    }
    #qr-result img { border-radius: 8px; border: 1px solid var(--border); }

    /* ── 스탬프 패널 (하단 시트) ── */
    #panel-stamp {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    #panel-stamp.open { display: flex; }
    .panel-inner {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 480px;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .panel-header h3 { font-size: 1.1rem; }
    .panel-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--text-dim);
      cursor: pointer;
      line-height: 1;
    }

    .stamp-counter { text-align: center; margin: 16px 0; }
    .stamp-counter .count {
      font-size: 4rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .stamp-counter .goal-text { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

    .stamp-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 16px 0 24px;
    }
    .dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      transition: all 0.2s;
    }
    .dot.filled { background: var(--accent); border-color: var(--accent); }

    .stamp-btns { display: flex; gap: 12px; }
    .stamp-btns .btn { flex: 1; }

    .history-list { margin-top: 20px; }
    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .history-item:last-child { border-bottom: none; }
    .delta-pos { color: var(--accent); font-weight: 600; }
    .delta-neg { color: var(--danger); font-weight: 600; }
    .ts { color: var(--text-dim); }

    /* ── 공통 ── */
    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    .empty-state .ei { font-size: 2rem; margin-bottom: 8px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.85rem;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="logo">Qding</div>
  <div class="login-box">
    <h2>스탬프 관리 로그인</h2>
    <input type="email" id="login-email" placeholder="이메일" autocomplete="email" />
    <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password" />
    <button class="btn btn-primary" id="btn-login">로그인</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard">
  <div class="topbar">
    <div>
      <div class="logo">Qding</div>
      <div class="store-name" id="header-store"></div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" id="btn-logout">로그아웃</button>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <div class="tab active" data-tab="cards">발급 카드</div>
      <div class="tab" data-tab="templates">템플릿</div>
    </div>

    <!-- 탭: 발급 카드 -->
    <div class="tab-content active" id="tab-cards">
      <div class="section-header">
        <span class="section-title">발급된 카드</span>
        <button class="btn btn-primary btn-sm" id="btn-open-issue">+ 카드 발급</button>
      </div>
      <div class="box" id="cards-list">
        <div class="empty-state"><div class="ei">🎫</div>발급된 카드가 없습니다</div>
      </div>
    </div>

    <!-- 탭: 템플릿 -->
    <div class="tab-content" id="tab-templates">
      <div class="section-header">
        <span class="section-title">새 템플릿</span>
      </div>
      <div class="box">
        <div class="tmpl-row">
          <input type="text" id="tmpl-reward" placeholder="리워드 (예: 아메리카노 1잔)" />
          <input type="number" id="tmpl-goal" placeholder="목표" value="10" style="max-width:90px;" />
          <button class="btn btn-primary btn-sm" id="btn-add-template">추가</button>
        </div>
      </div>
      <div class="section-header">
        <span class="section-title">템플릿 목록</span>
      </div>
      <div class="box" id="templates-list">
        <div class="empty-state"><div class="ei">📋</div>템플릿이 없습니다</div>
      </div>
    </div>
  </div>
</div>

<!-- 카드 발급 모달 -->
<div id="modal-issue">
  <div class="modal-inner">
    <h3>카드 발급</h3>
    <select id="issue-template">
      <option value="">템플릿 선택</option>
    </select>
    <div id="qr-result" style="display:none;"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="btn-modal-cancel">닫기</button>
      <button class="btn btn-primary" id="btn-issue-confirm">발급</button>
    </div>
  </div>
</div>

<!-- 스탬프 관리 패널 -->
<div id="panel-stamp">
  <div class="panel-inner">
    <div class="panel-header">
      <h3>스탬프 관리</h3>
      <button class="panel-close" id="btn-panel-close">✕</button>
    </div>
    <div class="stamp-counter">
      <div class="count" id="panel-count">0</div>
      <div class="goal-text" id="panel-goal-text">/ 10 개</div>
    </div>
    <div class="stamp-dots" id="panel-dots"></div>
    <div class="stamp-btns">
      <button class="btn btn-primary" id="btn-stamp-add">+ 스탬프 찍기</button>
      <button class="btn btn-danger" id="btn-stamp-use">리워드 사용</button>
    </div>
    <div class="history-list" id="panel-history"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://knwaqyeznxvhkmvqigaf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtud2FxeWV6bnh2aGttdnFpZ2FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDUxODUsImV4cCI6MjA5NzMyMTE4NX0.7WZwkIXnMxzCDvAy8JCRUp5ybXwFDQJc7GHfHhfXF_M';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentOwner = null;
let currentCardId = null;
let currentGoal   = 10;
let currentCount  = 0;

// ── 유틸 ──────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function makeQR(text) {
  return `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(text)}`;
}

// ── 탭 ───────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ── 인증 ─────────────────────────────────────────
db.auth.onAuthStateChange(async (event, session) => {
  if (session) await initDashboard(session.user);
  else showLogin();
});

document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  if (error) errEl.textContent = '이메일 또는 비밀번호를 확인해주세요.';
});

document.getElementById('btn-logout').addEventListener('click', async () => {
  await db.auth.signOut();
});

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  currentOwner = null;
}

async function initDashboard(user) {
  // 기존 qr_owers 테이블 그대로 사용
  const { data: owner, error } = await db
    .from('qr_owers')
    .select('*')
    .eq('id', user.id)
    .single();

  if (error || !owner) {
    document.getElementById('login-error').textContent = '등록된 가게 정보가 없습니다.';
    return;
  }

  currentOwner = owner;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('header-store').textContent = owner.store_name;

  await loadTemplates();
  await loadCards();
}

// ── 템플릿 ───────────────────────────────────────
async function loadTemplates() {
  const { data } = await db
    .from('stamp_templates')
    .select('*')
    .eq('owner_id', currentOwner.id)
    .order('created_at');

  const el  = document.getElementById('templates-list');
  const sel = document.getElementById('issue-template');
  sel.innerHTML = '<option value="">템플릿 선택</option>';

  if (!data || data.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="ei">📋</div>템플릿이 없습니다</div>';
    return;
  }

  el.innerHTML = data.map(t => `
    <div class="tmpl-item">
      <div>
        <div class="tmpl-reward">${t.reward}</div>
        <div class="tmpl-goal">스탬프 ${t.stamp_goal}개 달성 시 지급</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="deleteTemplate('${t.id}')">삭제</button>
    </div>
  `).join('');

  data.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.reward} (${t.stamp_goal}개)`;
    opt.dataset.goal = t.stamp_goal;
    sel.appendChild(opt);
  });
}

document.getElementById('btn-add-template').addEventListener('click', async () => {
  const reward = document.getElementById('tmpl-reward').value.trim();
  const goal   = parseInt(document.getElementById('tmpl-goal').value);
  if (!reward || !goal) return showToast('리워드와 목표 수를 입력하세요');

  const { error } = await db.from('stamp_templates').insert({
    owner_id: currentOwner.id,
    reward,
    stamp_goal: goal
  });
  if (error) return showToast('오류: ' + error.message);

  document.getElementById('tmpl-reward').value = '';
  document.getElementById('tmpl-goal').value = '10';
  showToast('템플릿 추가 완료 ✓');
  await loadTemplates();
});

async function deleteTemplate(id) {
  if (!confirm('삭제할까요?')) return;
  await db.from('stamp_templates').delete().eq('id', id);
  showToast('삭제 완료');
  await loadTemplates();
}

// ── 카드 발급 ─────────────────────────────────────
document.getElementById('btn-open-issue').addEventListener('click', () => {
  document.getElementById('qr-result').style.display = 'none';
  document.getElementById('btn-issue-confirm').style.display = 'block';
  document.getElementById('modal-issue').classList.add('open');
});

document.getElementById('btn-modal-cancel').addEventListener('click', () => {
  document.getElementById('modal-issue').classList.remove('open');
  loadCards();
});

document.getElementById('btn-issue-confirm').addEventListener('click', async () => {
  const sel = document.getElementById('issue-template');
  const tid = sel.value;
  if (!tid) return showToast('템플릿을 선택하세요');

  const { data, error } = await db
    .from('stamp_cards')
    .insert({ template_id: tid, owner_id: currentOwner.id })
    .select()
    .single();

  if (error) return showToast('발급 오류: ' + error.message);

  const cardUrl = `${location.origin}/qr_stamp/stampcard/?id=${data.id}`;
  const qrEl = document.getElementById('qr-result');
  qrEl.style.display = 'block';
  qrEl.innerHTML = `
    <img src="${makeQR(cardUrl)}" width="180" height="180" />
    <p>손님에게 QR을 보여주거나 링크를 공유하세요</p>
    <div class="qr-url">${cardUrl}</div>
  `;
  document.getElementById('btn-issue-confirm').style.display = 'none';
  showToast('카드 발급 완료! 🎉');
});

// ── 카드 목록 ─────────────────────────────────────
async function loadCards() {
  const { data: cards } = await db
    .from('stamp_cards')
    .select('*, stamp_templates(reward, stamp_goal)')
    .eq('owner_id', currentOwner.id)
    .order('issued_at', { ascending: false });

  const el = document.getElementById('cards-list');

  if (!cards || cards.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="ei">🎫</div>발급된 카드가 없습니다</div>';
    return;
  }

  // 스탬프 합계 한 번에 조회
  const cardIds = cards.map(c => c.id);
  const { data: events } = await db
    .from('stamp_events')
    .select('card_id, delta')
    .in('card_id', cardIds);

  const sumMap = {};
  (events || []).forEach(e => {
    sumMap[e.card_id] = (sumMap[e.card_id] || 0) + e.delta;
  });

  el.innerHTML = cards.map(c => {
    const count  = sumMap[c.id] || 0;
    const goal   = c.stamp_templates?.stamp_goal || 10;
    const reward = c.stamp_templates?.reward || '';
    return `
      <div class="card-item">
        <div style="flex:1;">
          <div class="card-id">${c.id.slice(0,8)}…</div>
          <div class="card-stamp">${count} / ${goal} 개</div>
          <div class="card-reward">${reward}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="openStampPanel('${c.id}', ${goal})">관리</button>
        </div>
      </div>
    `;
  }).join('');
}

// ── 스탬프 패널 ───────────────────────────────────
async function openStampPanel(cardId, goal) {
  currentCardId = cardId;
  currentGoal   = goal;
  await refreshPanel();
  document.getElementById('panel-stamp').classList.add('open');
}

async function refreshPanel() {
  const { data: events } = await db
    .from('stamp_events')
    .select('*')
    .eq('card_id', currentCardId)
    .order('stamped_at', { ascending: false });

  currentCount = (events || []).reduce((s, e) => s + e.delta, 0);

  document.getElementById('panel-count').textContent = currentCount;
  document.getElementById('panel-goal-text').textContent = `/ ${currentGoal} 개`;

  // 도트
  const dots = document.getElementById('panel-dots');
  dots.innerHTML = Array.from({ length: currentGoal }, (_, i) =>
    `<div class="dot ${i < currentCount ? 'filled' : ''}"></div>`
  ).join('');

  // 이력
  const hist = document.getElementById('panel-history');
  if (!events || events.length === 0) {
    hist.innerHTML = '<div class="empty-state" style="padding:16px 0;">이력 없음</div>';
    return;
  }
  hist.innerHTML = events.slice(0, 10).map(e => `
    <div class="history-item">
      <span class="${e.delta > 0 ? 'delta-pos' : 'delta-neg'}">
        ${e.delta > 0 ? '+' : ''}${e.delta} ${e.note || ''}
      </span>
      <span class="ts">${fmtDate(e.stamped_at)}</span>
    </div>
  `).join('');
}

document.getElementById('btn-panel-close').addEventListener('click', () => {
  document.getElementById('panel-stamp').classList.remove('open');
  loadCards();
});

document.getElementById('btn-stamp-add').addEventListener('click', async () => {
  const { error } = await db.from('stamp_events').insert({
    card_id:  currentCardId,
    owner_id: currentOwner.id,
    delta:    1,
    note:     '스탬프 적립'
  });
  if (error) return showToast('오류: ' + error.message);
  showToast('스탬프 +1 ✓');
  await refreshPanel();
});

document.getElementById('btn-stamp-use').addEventListener('click', async () => {
  if (currentCount < currentGoal)
    return showToast(`스탬프가 부족합니다 (${currentCount}/${currentGoal})`);
  if (!confirm(`리워드를 사용할까요? (-${currentGoal}개)`)) return;

  const { error } = await db.from('stamp_events').insert({
    card_id:  currentCardId,
    owner_id: currentOwner.id,
    delta:    -currentGoal,
    note:     '리워드 사용'
  });
  if (error) return showToast('오류: ' + error.message);
  showToast('리워드 사용 완료! 🎉');
  await refreshPanel();
});

// ── QR 스캔 후 진입 (?scan=card_id) ─────────────
const params = new URLSearchParams(location.search);
const scanId = params.get('scan');
if (scanId) {
  db.auth.getSession().then(async ({ data }) => {
    if (!data.session) return;
    const { data: card } = await db
      .from('stamp_cards')
      .select('*, stamp_templates(stamp_goal)')
      .eq('id', scanId)
      .single();
    if (card) openStampPanel(card.id, card.stamp_templates?.stamp_goal || 10);
  });
}
</script>
