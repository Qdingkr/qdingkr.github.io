<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qding QR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 400px; margin: 0 auto; }

  .logo { font-size: 1.2rem; font-weight: 700; color: #1a1a1a; text-align: center; margin-bottom: 2rem; }
  .logo span { color: #00A876; }

  /* 테이블 정보 */
  .table-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 2rem 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-align: center; }
  .table-name { font-size: 1.8rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.5rem; }
  .table-desc { font-size: 0.9rem; color: #888; line-height: 1.6; }

  /* 빠른 호출 버튼 */
  .quick-title { font-size: 0.75rem; font-weight: 600; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .quick-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
  .quick-btn { background: #fff; border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 0.75rem; font-size: 0.9rem; font-weight: 600; color: #1a1a1a; cursor: pointer; transition: all 0.2s; text-align: center; }
  .quick-btn:hover { border-color: #00A876; color: #00A876; background: #f0faf6; }
  .quick-btn:active { transform: scale(0.97); }
  .quick-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 0.3rem; }

  /* 직접 입력 */
  .custom-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .custom-title { font-size: 0.75rem; font-weight: 600; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; }
  textarea { width: 100%; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 8px; padding: 0.75rem 1rem; color: #1a1a1a; font-size: 0.9rem; font-family: inherit; outline: none; resize: none; height: 80px; line-height: 1.5; transition: border-color 0.2s; margin-bottom: 0.75rem; }
  textarea:focus { border-color: #00A876; background: #fff; }
  textarea::placeholder { color: #bbb; }
  .send-btn { width: 100%; background: #00A876; color: #fff; border: none; border-radius: 8px; padding: 0.85rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s; }
  .send-btn:hover { background: #009068; }
  .send-btn:active { transform: scale(0.98); }
  .send-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* 완료 메시지 */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; font-size: 0.9rem; font-weight: 600; padding: 0.8rem 1.5rem; border-radius: 50px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .loading { text-align: center; color: #bbb; font-size: 0.85rem; padding: 3rem 0; }
  .error { text-align: center; color: #e05050; font-size: 0.85rem; padding: 3rem 0; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Q<span>ding</span></div>
  <div id="mainContent"><div class="loading">불러오는 중...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://knwaqyeznxvhkmvqigaf.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtud2FxeWV6bnh2aGttdnFpZ2FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDUxODUsImV4cCI6MjA5NzMyMTE4NX0.7WZwkIXnMxzCDvAy8JCRUp5ybXwFDQJc7GHfHhfXF_M'
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  const params = new URLSearchParams(window.location.search)
  const tableId = parseInt(params.get('id'))

  // 빠른 호출 버튼 목록
  const QUICK_CALLS = [
    { icon: '🙋', label: '직원 호출' },
    { icon: '💧', label: '물 주세요' },
    { icon: '🧾', label: '계산해주세요' },
    { icon: '🍽️', label: '그릇 치워주세요' },
  ]

  async function loadTable() {
    const { data, error } = await db
      .from('qr_tables')
      .select('*')
      .eq('id', tableId)
      .single()

    const el = document.getElementById('mainContent')

    if (error || !data) {
      el.innerHTML = '<div class="error">테이블을 찾을 수 없습니다</div>'
      return
    }

    // 빠른 버튼
    const quickBtns = QUICK_CALLS.map(q =>
      '<button class="quick-btn" onclick="sendCall(\'' + q.label + '\')">' +
        '<span class="icon">' + q.icon + '</span>' + q.label +
      '</button>'
    ).join('')

    el.innerHTML =
      '<div class="table-card">' +
        '<div class="table-name">' + data.name + '</div>' +
        (data.description ? '<div class="table-desc">' + data.description + '</div>' : '') +
      '</div>' +

      '<div class="quick-title">빠른 호출</div>' +
      '<div class="quick-btns">' + quickBtns + '</div>' +

      '<div class="custom-card">' +
        '<div class="custom-title">직접 입력</div>' +
        '<textarea id="customMsg" placeholder="요청사항을 입력하세요"></textarea>' +
        '<button class="send-btn" id="sendBtn" onclick="sendCustom()">전송</button>' +
      '</div>'
  }

  async function sendCall(message) {
    const { error } = await db
      .from('qr_calls')
      .insert({ table_id: tableId, message, status: 'pending' })

    if (error) { showToast('전송 실패. 다시 시도해주세요 ❌'); return }
    showToast(message + ' 전송됨 ✓')
  }

  async function sendCustom() {
    const msg = document.getElementById('customMsg').value.trim()
    if (!msg) return

    const btn = document.getElementById('sendBtn')
    btn.disabled = true

    const { error } = await db
      .from('qr_calls')
      .insert({ table_id: tableId, message: msg, status: 'pending' })

    if (error) { showToast('전송 실패 ❌') }
    else {
      document.getElementById('customMsg').value = ''
      showToast('전송되었습니다 ✓')
    }

    btn.disabled = false
  }

  function showToast(msg) {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.classList.add('show')
    setTimeout(() => el.classList.remove('show'), 2500)
  }

  if (tableId) { loadTable() }
  else { document.getElementById('mainContent').innerHTML = '<div class="error">잘못된 QR 코드입니다</div>' }
</script>
</body>
</html>
