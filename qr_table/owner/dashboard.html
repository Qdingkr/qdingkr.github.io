<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qding QR - 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 640px; margin: 0 auto; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .logo { font-size: 1.4rem; font-weight: 700; color: #1a1a1a; }
  .logo span { color: #00A876; }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .user-email { font-size: 0.8rem; color: #aaa; }
  .logout-btn { font-size: 0.8rem; color: #aaa; background: none; border: 1px solid #ddd; border-radius: 6px; padding: 0.4rem 0.8rem; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
  .logout-btn:hover { color: #e05050; border-color: #e05050; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-title { font-size: 0.8rem; font-weight: 600; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; }
  .add-btn { background: #00A876; color: #fff; border: none; border-radius: 6px; padding: 0.45rem 1rem; font-size: 0.8rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: background 0.2s; }
  .add-btn:hover { background: #009068; }
  .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
  .table-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1.25rem; cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s; }
  .table-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #00A876; }
  .table-card.active { border-color: #00A876; box-shadow: 0 4px 16px rgba(0,168,118,0.12); }
  .table-name { font-size: 1rem; font-weight: 600; color: #1a1a1a; margin-bottom: 0.3rem; }
  .table-desc { font-size: 0.75rem; color: #aaa; margin-bottom: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pending-badge { display: inline-block; background: #fff3e0; color: #e65100; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 4px; }
  .pending-badge.none { background: #f0f0f0; color: #bbb; }
  .calls-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .call-item { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #f0f0f0; }
  .call-item:last-child { border-bottom: none; }
  .call-left { flex: 1; }
  .call-message { font-size: 0.9rem; color: #1a1a1a; margin-bottom: 0.2rem; }
  .call-meta { font-size: 0.75rem; color: #aaa; }
  .call-status { display: flex; gap: 0.5rem; align-items: center; }
  .status-badge { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 4px; }
  .status-badge.pending { background: #fff3e0; color: #e65100; }
  .status-badge.done { background: #e8f5e9; color: #2e7d32; }
  .done-btn { background: none; border: 1px solid #ddd; border-radius: 6px; color: #aaa; font-size: 0.75rem; padding: 0.3rem 0.6rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .done-btn:hover { border-color: #00A876; color: #00A876; }
  /* ★ 삭제 버튼 */
  .del-btn { background: none; border: 1px solid #ddd; border-radius: 6px; color: #ddd; font-size: 0.75rem; padding: 0.3rem 0.6rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .del-btn:hover { border-color: #e05050; color: #e05050; }
  .empty { text-align: center; color: #bbb; font-size: 0.85rem; padding: 2rem 0; }
  .loading { text-align: center; color: #bbb; font-size: 0.85rem; padding: 2rem 0; }
  .msg-bar { font-size: 0.8rem; color: #00A876; height: 1.2em; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Q<span>ding</span> <span style="font-size:0.8rem;color:#aaa;font-weight:400;">Owner</span></div>
    <div class="header-right">
      <span class="user-email" id="userEmail"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <div class="section-header">
    <div class="section-title">내 테이블</div>
    <a class="add-btn" href="tables.html">+ 테이블 관리</a>
  </div>
  <div class="table-grid" id="tableGrid">
    <div class="loading">불러오는 중...</div>
  </div>

  <div class="section-header">
    <div class="section-title" id="callsTitle">호출 현황</div>
    <div class="msg-bar" id="msgBar"></div>
  </div>
  <div id="callsList"><div class="loading">테이블을 선택하세요</div></div>
</div>

<script>
  const SUPABASE_URL = 'https://knwaqyeznxvhkmvqigaf.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtud2FxeWV6bnh2aGttdnFpZ2FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDUxODUsImV4cCI6MjA5NzMyMTE4NX0.7WZwkIXnMxzCDvAy8JCRUp5ybXwFDQJc7GHfHhfXF_M'
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  let selectedTableId = null

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000)
    if (diff < 60) return '방금'
    if (diff < 3600) return Math.floor(diff / 60) + '분 전'
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전'
    return Math.floor(diff / 86400) + '일 전'
  }

  async function checkSession() {
    const { data: { session } } = await db.auth.getSession()
    if (!session) { window.location.href = 'login.html'; return }
    document.getElementById('userEmail').textContent = session.user.email
  }

  async function loadTables() {
    const { data, error } = await db
      .from('qr_tables')
      .select('*, qr_calls(count)')
      .order('created_at', { ascending: true })

    const grid = document.getElementById('tableGrid')
    if (error || !data || data.length === 0) {
      grid.innerHTML = '<div class="empty">등록된 테이블이 없습니다<br><a href="tables.html" style="color:#00A876;font-size:0.85rem;">테이블 추가하기</a></div>'
      return
    }

    grid.innerHTML = data.map(t => {
      const pendingCount = t.qr_calls[0]?.count || 0
      return '<div class="table-card" id="tc-' + t.id + '" onclick="selectTable(' + t.id + ', \'' + t.name + '\')">' +
        '<div class="table-name">' + t.name + '</div>' +
        '<div class="table-desc">' + (t.description || '&nbsp;') + '</div>' +
        '<span class="pending-badge ' + (pendingCount === 0 ? 'none' : '') + '">' +
          (pendingCount === 0 ? '대기 없음' : '🔔 ' + pendingCount + '건 대기') +
        '</span>' +
      '</div>'
    }).join('')

    if (data.length > 0) selectTable(data[0].id, data[0].name)
  }

  function selectTable(id, name) {
    selectedTableId = id
    document.querySelectorAll('.table-card').forEach(c => c.classList.remove('active'))
    const card = document.getElementById('tc-' + id)
    if (card) card.classList.add('active')
    document.getElementById('callsTitle').textContent = name + ' 호출 현황'
    loadCalls(id)
  }

  async function loadCalls(tableId) {
    const { data, error } = await db
      .from('qr_calls')
      .select('*')
      .eq('table_id', tableId)
      .order('created_at', { ascending: false })

    const el = document.getElementById('callsList')
    if (error || !data || data.length === 0) {
      el.innerHTML = '<div class="empty">호출 내역이 없습니다</div>'
      return
    }

    el.innerHTML = '<div class="calls-card">' +
      data.map(c =>
        '<div class="call-item">' +
          '<div class="call-left">' +
            '<div class="call-message">' + c.message + '</div>' +
            '<div class="call-meta">' + timeAgo(c.created_at) + '</div>' +
          '</div>' +
          '<div class="call-status">' +
            '<span class="status-badge ' + c.status + '">' + (c.status === 'pending' ? '대기중' : '완료') + '</span>' +
            (c.status === 'pending' ? '<button class="done-btn" onclick="markDone(' + c.id + ')">완료</button>' : '') +
            '<button class="del-btn" onclick="deleteCall(' + c.id + ')">✕</button>' +
          '</div>' +
        '</div>'
      ).join('') +
    '</div>'
  }

  async function markDone(id) {
    const { error } = await db.from('qr_calls').update({ status: 'done' }).eq('id', id)
    const msg = document.getElementById('msgBar')
    if (error) { msg.textContent = '처리 실패'; return }
    msg.textContent = '처리 완료 ✓'
    setTimeout(() => { msg.textContent = '' }, 2000)
    loadTables()
    if (selectedTableId) loadCalls(selectedTableId)
  }

  // ★ 삭제
  async function deleteCall(id) {
    const { error } = await db.from('qr_calls').delete().eq('id', id)
    const msg = document.getElementById('msgBar')
    if (error) { msg.textContent = '삭제 실패'; return }
    msg.textContent = '삭제됨 ✓'
    setTimeout(() => { msg.textContent = '' }, 2000)
    loadTables()
    if (selectedTableId) loadCalls(selectedTableId)
  }

  async function logout() {
    await db.auth.signOut()
    window.location.href = 'login.html'
  }

  // ★ 브라우저 알림 권한 요청
  async function requestNotificationPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
      await Notification.requestPermission()
    }
  }

  // ★ 브라우저 알림 + TTS
  function showNotification(message) {
    // 브라우저 알림
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('🔔 새 호출', { body: message })
    }

    // TTS
    if ('speechSynthesis' in window) {
      const text = '호출이 왔습니다. ' + message
      const utterance = new SpeechSynthesisUtterance(text)
      utterance.lang = 'ko-KR'
      utterance.rate = 0.9
      utterance.volume = 1
      speechSynthesis.speak(utterance)
    }

    // 탭 타이틀 깜빡임
    let blink = 0
    const original = document.title
    const timer = setInterval(() => {
      document.title = blink % 2 === 0 ? '🔔 새 호출!' : original
      blink++
      if (blink > 10) { clearInterval(timer); document.title = original }
    }, 600)
  }

  // ★ Polling — 5초마다 새 호출 확인
  let lastCallId = 0

  async function pollCalls() {
    if (!selectedTableId) return

    const { data } = await db
      .from('qr_calls')
      .select('*')
      .eq('table_id', selectedTableId)
      .eq('status', 'pending')
      .order('id', { ascending: false })
      .limit(1)

    if (data && data.length > 0 && data[0].id > lastCallId) {
      if (lastCallId > 0) {
        // 새 호출 감지
        loadCalls(selectedTableId)
        loadTables()
        showNotification(data[0].message)
      }
      lastCallId = data[0].id
    }
  }

  setInterval(pollCalls, 5000)

  checkSession()
  loadTables()
  requestNotificationPermission()
  pollCalls()
</script>
</body>
</html>
