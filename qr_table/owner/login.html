<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qding QR - 오너 로그인</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .logo { font-size: 1.8rem; font-weight: 700; color: #1a1a1a; text-align: center; margin-bottom: 0.4rem; }
  .logo span { color: #00A876; }
  .subtitle { font-size: 0.8rem; color: #aaa; text-align: center; margin-bottom: 2rem; letter-spacing: 0.1em; text-transform: uppercase; }
  label { display: block; font-size: 0.75rem; font-weight: 600; color: #00A876; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; }
  input { width: 100%; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 8px; padding: 0.75rem 1rem; color: #1a1a1a; font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s; margin-bottom: 1rem; }
  input:focus { border-color: #00A876; background: #fff; }
  input::placeholder { color: #bbb; }
  button { width: 100%; background: #00A876; color: #fff; border: none; border-radius: 8px; padding: 0.85rem; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 0.5rem; }
  button:hover { background: #009068; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #ccc; color: #fff; cursor: not-allowed; }
  .msg { font-size: 0.8rem; text-align: center; margin-top: 0.75rem; height: 1.2em; color: #e05050; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Q<span>ding</span></div>
  <div class="subtitle">Owner Login</div>

  <label>이메일</label>
  <input type="email" id="emailInput" placeholder="owner@example.com" autocomplete="off">

  <label>비밀번호</label>
  <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="new-password"
         onkeydown="if(event.key==='Enter') login()">

  <button id="loginBtn" onclick="login()">로그인</button>
  <div class="msg" id="msg"></div>
</div>

<script>
  const SUPABASE_URL = 'https://knwaqyeznxvhkmvqigaf.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtud2FxeWV6bnh2aGttdnFpZ2FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDUxODUsImV4cCI6MjA5NzMyMTE4NX0.7WZwkIXnMxzCDvAy8JCRUp5ybXwFDQJc7GHfHhfXF_M'
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  async function checkSession() {
    const { data: { session } } = await db.auth.getSession()
    if (session) window.location.href = 'dashboard.html'
  }

  async function login() {
    const email = document.getElementById('emailInput').value.trim()
    const password = document.getElementById('passwordInput').value
    const btn = document.getElementById('loginBtn')
    const msg = document.getElementById('msg')

    if (!email || !password) { msg.textContent = '이메일과 비밀번호를 입력해주세요'; return }

    btn.disabled = true
    btn.textContent = '로그인 중...'
    msg.textContent = ''

    const { data, error } = await db.auth.signInWithPassword({ email, password })

    if (error) {
      msg.textContent = '이메일 또는 비밀번호가 틀렸습니다'
      btn.disabled = false
      btn.textContent = '로그인'
      return
    }

    // qr_owners 등록 여부 확인 → 없으면 자동 생성
    const { data: owner } = await db
      .from('qr_owners')
      .select('id')
      .eq('id', data.user.id)
      .single()

    if (!owner) {
      await db.from('qr_owners').insert({
        id: data.user.id,
        store_name: data.user.email
      })
    }

    window.location.href = 'dashboard.html'
  }

  checkSession()
</script>
</body>
</html>
