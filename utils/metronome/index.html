<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메트로놈</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00A876">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="메트로놈">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    user-select: none;
  }

  .logo { font-size: 1rem; font-weight: 700; color: #1a1a1a; margin-bottom: 2.5rem; }
  .logo span { color: #00A876; }

  /* 비트 표시기 */
  .beat-indicator {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 2.5rem;
  }

  .beat-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e0e0e0;
    transition: background 0.05s;
  }

  .beat-dot.active { background: #00A876; }
  .beat-dot.accent { background: #e65100; }

  /* BPM 표시 */
  .bpm-display {
    font-size: 5rem;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
    margin-bottom: 0.5rem;
    min-width: 180px;
    text-align: center;
  }

  .bpm-label {
    font-size: 0.8rem;
    color: #aaa;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 2rem;
  }

  /* BPM 슬라이더 */
  .slider-wrap { width: 100%; max-width: 320px; margin-bottom: 2rem; }
  input[type=range] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    background: #e0e0e0;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #00A876;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,168,118,0.3);
  }

  /* BPM 조절 버튼 */
  .bpm-controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .bpm-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid #e0e0e0;
    background: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
  }

  .bpm-btn:hover { border-color: #00A876; color: #00A876; }
  .bpm-btn:active { transform: scale(0.93); }

  /* 박자 선택 */
  .time-sig {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
  }

  .sig-btn {
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    border: 1.5px solid #e0e0e0;
    background: #fff;
    font-size: 0.85rem;
    font-weight: 600;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sig-btn.active { background: #00A876; border-color: #00A876; color: #fff; }

  /* 시작/정지 버튼 */
  .play-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    background: #00A876;
    color: #fff;
    font-size: 1.8rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(0,168,118,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .play-btn:hover { background: #009068; }
  .play-btn:active { transform: scale(0.95); }
  .play-btn.playing { background: #e65100; box-shadow: 0 4px 20px rgba(230,81,0,0.3); }

  /* 탭 템포 */
  .tap-btn {
    margin-top: 1.5rem;
    padding: 0.6rem 1.5rem;
    border-radius: 20px;
    border: 1.5px solid #e0e0e0;
    background: #fff;
    font-size: 0.85rem;
    font-weight: 600;
    color: #555;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tap-btn:active { background: #f0faf6; border-color: #00A876; color: #00A876; transform: scale(0.97); }

  .install-btn {
    margin-top: 2rem;
    padding: 0.6rem 1.5rem;
    border-radius: 20px;
    border: 1.5px solid #00A876;
    background: #fff;
    font-size: 0.8rem;
    font-weight: 600;
    color: #00A876;
    cursor: pointer;
    display: none;
  }
</style>
</head>
<body>

<div class="logo">Q<span>ding</span> 메트로놈</div>

<!-- 비트 표시기 -->
<div class="beat-indicator" id="beatIndicator"></div>

<!-- BPM 표시 -->
<div class="bpm-display" id="bpmDisplay">120</div>
<div class="bpm-label">BPM</div>

<!-- 슬라이더 -->
<div class="slider-wrap">
  <input type="range" id="bpmSlider" min="40" max="240" value="120">
</div>

<!-- BPM 조절 -->
<div class="bpm-controls">
  <button class="bpm-btn" onclick="changeBpm(-10)">-10</button>
  <button class="bpm-btn" onclick="changeBpm(-1)">-</button>
  <button class="bpm-btn" onclick="changeBpm(1)">+</button>
  <button class="bpm-btn" onclick="changeBpm(10)">+10</button>
</div>

<!-- 박자 선택 -->
<div class="time-sig">
  <button class="sig-btn active" onclick="setTimeSig(2)">2/4</button>
  <button class="sig-btn active" onclick="setTimeSig(3)">3/4</button>
  <button class="sig-btn active" onclick="setTimeSig(4)">4/4</button>
  <button class="sig-btn" onclick="setTimeSig(6)">6/8</button>
</div>

<!-- 시작/정지 -->
<button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>

<!-- 탭 템포 -->
<button class="tap-btn" onclick="tapTempo()">탭 템포</button>

<!-- PWA 설치 버튼 -->
<button class="install-btn" id="installBtn" onclick="installPWA()">홈 화면에 추가</button>

<script>
  let bpm = 120
  let beatsPerMeasure = 4
  let currentBeat = 0
  let isPlaying = false
  let intervalId = null
  let audioCtx = null

  // 탭 템포
  let tapTimes = []

  // PWA 설치
  let deferredPrompt = null

  // 비트 표시기 생성
  function renderBeatIndicator() {
    const el = document.getElementById('beatIndicator')
    el.innerHTML = Array.from({ length: beatsPerMeasure }, (_, i) =>
      '<div class="beat-dot" id="dot-' + i + '"></div>'
    ).join('')
  }

  // 비트 표시
  function highlightBeat(beat) {
    document.querySelectorAll('.beat-dot').forEach((d, i) => {
      d.classList.remove('active', 'accent')
      if (i === beat) {
        d.classList.add(beat === 0 ? 'accent' : 'active')
      }
    })
  }

  // Web Audio API 비프음
  function beep(isAccent) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()

    const osc = audioCtx.createOscillator()
    const gain = audioCtx.createGain()

    osc.connect(gain)
    gain.connect(audioCtx.destination)

    osc.frequency.value = isAccent ? 1000 : 800
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05)

    osc.start(audioCtx.currentTime)
    osc.stop(audioCtx.currentTime + 0.05)
  }

  // 메트로놈 틱
  function tick() {
    highlightBeat(currentBeat)
    beep(currentBeat === 0)
    currentBeat = (currentBeat + 1) % beatsPerMeasure
  }

  // 시작/정지
  function togglePlay() {
    isPlaying = !isPlaying
    const btn = document.getElementById('playBtn')

    if (isPlaying) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
      audioCtx.resume()
      currentBeat = 0
      tick()
      intervalId = setInterval(tick, 60000 / bpm)
      btn.textContent = '■'
      btn.classList.add('playing')
    } else {
      clearInterval(intervalId)
      btn.textContent = '▶'
      btn.classList.remove('playing')
      document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active', 'accent'))
    }
  }

  // BPM 변경
  function changeBpm(delta) {
    bpm = Math.min(240, Math.max(40, bpm + delta))
    updateBpm()
  }

  function updateBpm() {
    document.getElementById('bpmDisplay').textContent = bpm
    document.getElementById('bpmSlider').value = bpm
    if (isPlaying) {
      clearInterval(intervalId)
      intervalId = setInterval(tick, 60000 / bpm)
    }
  }

  // 슬라이더
  document.getElementById('bpmSlider').addEventListener('input', e => {
    bpm = parseInt(e.target.value)
    updateBpm()
  })

  // 박자 선택
  function setTimeSig(beats) {
    beatsPerMeasure = beats
    currentBeat = 0
    document.querySelectorAll('.sig-btn').forEach((b, i) => {
      b.classList.toggle('active', [2,3,4,6][i] === beats)
    })
    renderBeatIndicator()
  }

  // 탭 템포
  function tapTempo() {
    const now = Date.now()
    tapTimes.push(now)
    if (tapTimes.length > 4) tapTimes.shift()
    if (tapTimes.length >= 2) {
      const intervals = []
      for (let i = 1; i < tapTimes.length; i++) {
        intervals.push(tapTimes[i] - tapTimes[i-1])
      }
      const avg = intervals.reduce((a, b) => a + b) / intervals.length
      bpm = Math.round(60000 / avg)
      bpm = Math.min(240, Math.max(40, bpm))
      updateBpm()
    }
    // 2초 후 탭 초기화
    clearTimeout(window.tapTimer)
    window.tapTimer = setTimeout(() => { tapTimes = [] }, 2000)
  }

  // PWA 설치
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault()
    deferredPrompt = e
    document.getElementById('installBtn').style.display = 'block'
  })

  function installPWA() {
    if (!deferredPrompt) return
    deferredPrompt.prompt()
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null
      document.getElementById('installBtn').style.display = 'none'
    })
  }

  // Service Worker 등록
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('SW 등록 완료'))
      .catch(e => console.log('SW 등록 실패', e))
  }

  // 초기화
  renderBeatIndicator()
  setTimeSig(4)
</script>
</body>
</html>
